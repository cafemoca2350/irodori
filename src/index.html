<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iRodoRi</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="titlebar" data-tauri-drag-region>
    <div id="titlebar-label">iRodoRi</div>
    <div class="titlebar-controls">
      <div class="titlebar-button" id="titlebar-minimize">
        <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1" y="5.5" width="10" height="1" fill="white"/></svg>
      </div>
      <div class="titlebar-button" id="titlebar-close">
        <svg width="12" height="12" viewBox="0 0 12 12"><path d="M1 1L11 11M11 1L1 11" stroke="white" stroke-width="1.5"/></svg>
      </div>
    </div>
  </div>

  <main>
    <section id="simple-mode">
      <div class="preset-header">
        <h2>クイックプリセット</h2>
        <button id="add-preset-btn" class="action-btn">＋ プリセットを追加</button>
      </div>
      <div class="hero-presets" id="presets-list">
        <!-- JSで動的に生成されます -->
      </div>
    </section>

    <section id="advanced-mode" class="collapsed">
      <div class="advanced-content">
        <div class="control-group">
          <!-- Sliders here -->
          <div class="slider-container">
            <div class="slider-header">
              <span>明るさ</span>
            </div>
            <input type="range" id="brightness-slider" min="0" max="100" value="50">
          </div>
          <div class="slider-container">
            <div class="slider-header">
              <span>コントラスト</span>
            </div>
            <input type="range" id="contrast-slider" min="0" max="100" value="50">
          </div>
          <div class="slider-container">
            <div class="slider-header">
              <span>ガンマ値</span>
            </div>
            <input type="range" id="gamma-slider" min="0.50" max="1.50" step="0.01" value="1.00">
          </div>
          <div class="slider-container">
            <div class="slider-header">
              <span>デジタルバイブランス</span>
            </div>
            <input type="range" id="vibrance-slider" min="0" max="100" value="50">
          </div>
          <div class="slider-container">
            <div class="slider-header">
              <span>色相</span>
            </div>
            <input type="range" id="hue-slider" min="0" max="360" value="0">
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-settings">
      <label class="toggle-label">
        <span>PC起動時に自動起動</span>
        <input type="checkbox" id="autostart-toggle">
        <span class="toggle-switch"></span>
      </label>
    </div>
  </footer>

  <script src="main.js"></script>
</body>
</html>
